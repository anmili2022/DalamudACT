name: Create Release

on:
  push:
    tags:
      - '*'
    tags-ignore:
      - testing_*

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Clean output
        shell: pwsh
        run: |
          if (Test-Path ./output) {
            Remove-Item ./output -Recurse -Force
          }

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build release package
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}'
          dotnet build ./DalamudACT/DalamudACT.csproj --configuration Release --nologo -p:Version=$ver -p:FileVersion=$ver -p:AssemblyVersion=$ver

      - name: Update output manifest version
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}'
          foreach ($path in @('./output/DalamudACT.json', './output/DalamudACT/DalamudACT.json')) {
            if (-not (Test-Path $path)) {
              continue
            }

            $json = Get-Content -Raw $path | ConvertFrom-Json
            $json.AssemblyVersion = $ver
            $json | ConvertTo-Json -Depth 10 | Set-Content -Path $path
          }

      - name: Archive release asset
        shell: pwsh
        run: Compress-Archive -Path ./output/DalamudACT.dll,./output/DalamudACT.json,./output/DalamudACT.deps.json -DestinationPath ./DalamudACT.zip

      - name: Prepare release notes
        shell: pwsh
        run: |
          Get-Content -Path ./md/RELEASE-NOTES.md -Raw -Encoding UTF8 | Set-Content -Path ./release-notes.md -Encoding utf8

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: DalamudACT ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ./release-notes.md
          files: ./DalamudACT.zip
