name: Create Test Release

on:
  push:
    tags:
      - testing_*

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up repository name environment variable
        shell: pwsh
        run: |
          $repoName = $env:GITHUB_REPOSITORY.Split('/')[1]
          echo "REPO_NAME=$repoName" >> $env:GITHUB_ENV
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - name: Clean output
        shell: pwsh
        run: |
          if (Test-Path ./output) {
            Remove-Item ./output -Recurse -Force
          }
      - name: Download Dalamud CN
        shell: pwsh
        run: |
          $dalamudPath = "$env:AppData\XIVLauncherCN\addon\Hooks\dev\"
          New-Item -ItemType Directory -Force -Path $dalamudPath | Out-Null
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip" -OutFile dalamud.zip -UseBasicParsing
          Expand-Archive -Force dalamud.zip $dalamudPath
      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore ./DalamudACT/DalamudACT.csproj
        env:
          DALAMUD_HOME: ${{ env.APPDATA }}\XIVLauncherCN\addon\Hooks\dev
      - name: Build
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}' -replace '^testing_'
          if ([string]::IsNullOrWhiteSpace($ver)) {
            throw 'Testing release version is empty.'
          }
          $dalamudPath = "$env:AppData\XIVLauncherCN\addon\Hooks\dev\"
          "TEST_RELEASE_VERSION=$ver" >> $env:GITHUB_ENV
          dotnet build ./DalamudACT/DalamudACT.csproj `
            --configuration Debug `
            --no-restore `
            --nologo `
            -p:DalamudLibPath="$dalamudPath" `
            -p:Version="$ver" `
            -p:FileVersion="$ver" `
            -p:AssemblyVersion="$ver"
      - name: write version into json
        shell: pwsh
        run: |
          foreach ($path in @('./output/DalamudACT.json', './output/DalamudACT/DalamudACT.json')) {
            if (-not (Test-Path $path)) {
              continue
            }

            $json = Get-Content -Raw -Encoding UTF8 $path | ConvertFrom-Json
            $json.AssemblyVersion = $env:TEST_RELEASE_VERSION
            $json | ConvertTo-Json -Depth 10 | Set-Content -Path $path -Encoding utf8
          }
      - name: Archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path ./output/DalamudACT.dll,./output/DalamudACT.json,./output/DalamudACT.deps.json `
            -DestinationPath ${{ env.REPO_NAME }}.zip `
            -Force
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          path: |
            ./output/DalamudACT.dll
            ./output/DalamudACT.json
            ./output/DalamudACT.deps.json
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ env.REPO_NAME }} ${{ github.ref }}
          draft: false
          prerelease: false
      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps
          asset_path: ./${{ env.REPO_NAME }}.zip
          asset_name: ${{ env.REPO_NAME }}.zip
          asset_content_type: application/zip

      - name: Write out repo.json
        shell: pwsh
        run: |
          $verT = '${{ github.ref_name }}'
          $path = './repo.json'
          $json = Get-Content -Raw -Encoding UTF8 $path | ConvertFrom-Json
          $json[0].TestingAssemblyVersion = $env:TEST_RELEASE_VERSION
          $json[0].DownloadLinkTesting = $json[0].DownloadLinkTesting -replace '[^/]+/${{ env.REPO_NAME }}.zip',"$verT/${{ env.REPO_NAME }}.zip"
          $json | ConvertTo-Json -Depth 10 -AsArray | Set-Content -Path $path -Encoding utf8

      - name: Commit repo.json
        shell: pwsh
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin master
          git branch -f master ${{ github.sha }}
          git checkout master
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ github.ref_name }}" || true
          git push origin master
